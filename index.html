<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Adhvaryu</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="menu"
        style=" margin-top: 4vh;   margin-left: 2vw; margin-right: 2vw; padding-left: 2vw; padding-right: 2vw;">
        <a href="index.html" class="menu-item active" data-hover="DEV ADHVARYU">DEV ADHVARYU</a>
        <a href="./work.php" class="menu-item" data-hover="WORK">KAAM</a>
        <a href="jaankaari.html" class="menu-item" data-hover="INFORMATION">JAANKAARI</a>
    </nav>
    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        document.querySelectorAll('.menu-item[data-hover]').forEach(item => {
            item.dataset.original = item.innerText;

            item.addEventListener("mouseenter", event => {
                let iteration = 0;
                const targetText = item.dataset.hover;
                clearInterval(item.interval);

                item.interval = setInterval(() => {
                    event.target.innerText = targetText
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) {
                                return targetText[index];
                            }
                            return letters[Math.floor(Math.random() * 26)];
                        })
                        .join("");

                    if (iteration >= targetText.length) {
                        clearInterval(item.interval);
                    }
                    iteration += 1 / 3;
                }, 10);
            });

            item.addEventListener("mouseleave", event => {
                let iteration = 0;
                const targetText = item.dataset.original;
                clearInterval(item.interval);

                item.interval = setInterval(() => {
                    event.target.innerText = targetText
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) {
                                return targetText[index];
                            }
                            return letters[Math.floor(Math.random() * 26)];
                        })
                        .join("");

                    if (iteration >= targetText.length) {
                        clearInterval(item.interval);
                    }
                    iteration += 1 / 3;
                }, 10);
            });
        });
    </script>
</body>

</html>
